name: Build macOS

on:
  # Runs when you push a tag like v1.0.0
  push:
    tags:
      - 'v*'
  # OR trigger it manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app (unsigned)
        run: npm run build:mac
        env:
          # Skips code signing — app will work but show a security warning on first open
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: MultiChat-macOS
          path: dist/*.dmg
          retention-days: 30

      # If triggered by a tag, also attach it to a GitHub Release automatically
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg

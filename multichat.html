<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MultiChat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  /* ── Reset & Base ── */
  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
  }

  :root {
    /* Platform Colors */
    --twitch: #9147ff;
    --youtube: #ff0000;
    --kick: #53fc18;
    --abstract: #00ffa3;
    
    /* Dynamic UI Variables */
    --bg-alpha: 1;
    --font-scale: 1;
    
    /* Themed Colors (linked to alpha) */
    --bg: rgba(14, 14, 16, var(--bg-alpha));
    --surface: rgba(24, 24, 27, var(--bg-alpha));
    --surface2: #1f1f23;
    --border: rgba(255, 255, 255, 0.07);
    --text: #efeff1;
    --muted: #adadb8;
    
    /* Typography */
    --font: 'IBM Plex Sans', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  /* CRITICAL FOR OBS TRANSPARENCY: 
     Force the browser engine's floor to be transparent 
  */
  html, body { 
    height: 100%; 
    background: transparent !important; 
    color: var(--text); 
    font-family: var(--font); 
    overflow: hidden; 
  }

  #app { 
    display: flex; 
    flex-direction: column; 
    height: 100vh; 
    background: var(--bg); 
    transition: background 0.1s ease; 
  }

  /* ── Header ── */
  header {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    padding: 8px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 6px;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .logo { 
    font-family: var(--mono); 
    font-size: 13px; 
    font-weight: 500; 
    color: var(--text); 
    letter-spacing: 0.03em; 
  }

  .live-badge {
    font-size: 10px; 
    font-weight: 600; 
    letter-spacing: 0.08em;
    background: #eb0400; 
    color: #fff;
    padding: 2px 6px; 
    border-radius: 3px;
    text-transform: uppercase;
  }

  /* ── Control Sliders ── */
  .control-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .control-label {
    font-size: 9px;
    font-family: var(--mono);
    color: var(--muted);
    text-transform: uppercase;
    min-width: 26px;
  }

  .control-val {
    font-size: 9px;
    font-family: var(--mono);
    color: var(--abstract);
    min-width: 32px;
    text-align: right;
  }

  input[type="range"] {
    flex: 1;
    height: 4px;
    accent-color: var(--abstract);
    cursor: pointer;
  }

  /* ── Filter Tabs ── */
  .filter-tabs { 
    display: flex; 
    gap: 4px; 
  }

  .tab {
    font-size: 11px; 
    font-weight: 500; 
    padding: 3px 8px;
    border-radius: 4px; 
    border: 1px solid transparent;
    cursor: pointer; 
    transition: all 0.15s; 
    background: none;
    color: var(--muted); 
    font-family: var(--font);
    display: flex; 
    align-items: center; 
    gap: 5px;
  }

  .tab.active-all    { background: rgba(255, 255, 255, 0.08); color: var(--text); border-color: var(--border); }
  .tab.active-twitch { background: rgba(145, 71, 255, 0.15); color: var(--twitch); border-color: rgba(145, 71, 255, 0.3); }
  .tab.active-youtube{ background: rgba(255, 0, 0, 0.12); color: #ff4444; border-color: rgba(255, 0, 0, 0.25); }
  .tab.active-kick     { background: rgba(83, 252, 24, 0.1); color: var(--kick); border-color: rgba(83, 252, 24, 0.25); }
  .tab.active-abstract { background: rgba(0, 255, 163, 0.1); color: var(--abstract); border-color: rgba(0, 255, 163, 0.25); }
  
  .tab:hover:not([class*="active"]) { 
    background: rgba(255, 255, 255, 0.04); 
    color: var(--text); 
  }

  .tab.icon-tab {
    padding: 4px 6px;
    line-height: 0;
  }

  /* ── Footer Counter Buttons ── */
  .counter-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    background: none;
    border: 1px solid transparent;
    border-radius: 4px;
    padding: 3px 7px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .counter-btn:hover:not([class*="active"]) {
    background: rgba(255,255,255,0.05);
    color: var(--text);
  }

  .counter-btn.active-all     { background: rgba(255,255,255,0.08); color: var(--text); border-color: var(--border); }
  .counter-btn.active-twitch  { background: rgba(145,71,255,0.15); color: var(--twitch); border-color: rgba(145,71,255,0.3); }
  .counter-btn.active-youtube { background: rgba(255,0,0,0.12); color: #ff4444; border-color: rgba(255,0,0,0.25); }
  .counter-btn.active-kick    { background: rgba(83,252,24,0.1); color: var(--kick); border-color: rgba(83,252,24,0.25); }
  .counter-btn.active-abstract{ background: rgba(0,255,163,0.1); color: var(--abstract); border-color: rgba(0,255,163,0.25); }
  .counter-btn.active-discord { background: rgba(114,137,218,0.15); color: #7289da; border-color: rgba(114,137,218,0.3); }

  /* ── Messages Area ── */
  #messages {
    flex: 1; 
    overflow-y: auto; 
    padding: 6px 0;
    scroll-behavior: smooth;
  }

  /* Custom Scrollbar linked to BG opacity */
  #messages::-webkit-scrollbar { 
    width: 4px; 
  }
  #messages::-webkit-scrollbar-track { 
    background: transparent; 
  }
  #messages::-webkit-scrollbar-thumb { 
    background: rgba(255, 255, 255, calc(0.2 * var(--bg-alpha))); 
    border-radius: 2px; 
  }

  .msg {
    display: flex; 
    align-items: flex-start; 
    gap: 8px;
    padding: 5px 12px; 
    transition: background 0.1s;
  }

  .msg:hover { 
    background: rgba(255, 255, 255, 0.03); 
  }

  .platform-hidden { 
    display: none !important; 
  }

  /* ── Chat Content Scaling ── */
  .username { 
    font-size: calc(12px * var(--font-scale)); 
    font-weight: 600; 
    overflow-wrap: anywhere;
    word-break: break-word;
  }
  
  .u-twitch    { color: var(--twitch); }
  .u-youtube   { color: #ff4444; }
  .u-kick      { color: var(--kick); }
  .u-abstract  { color: var(--abstract); }
  .u-discord   { color: #7289da; }

  .timestamp { 
    font-size: calc(10px * var(--font-scale)); 
    color: rgba(173, 173, 184, 0.45); 
    font-family: var(--mono); 
  }

  .badge { 
    font-size: calc(9px * var(--font-scale)); 
    font-weight: 600; 
    letter-spacing: 0.05em; 
    padding: 1px 4px; 
    border-radius: 2px; 
    text-transform: uppercase; 
  }
  
  .badge-sub { background: rgba(145, 71, 255, 0.2); color: #c08fff; }
  .badge-mod { background: rgba(83, 252, 24, 0.12); color: #7dff6b; }
  .badge-vip { background: rgba(255, 180, 0, 0.15); color: #ffcc44; }

  .msg-body  { 
    flex: 1; 
    min-width: 0;
    overflow: hidden;
  }
  
  .msg-header { 
    display: flex; 
    align-items: baseline; 
    gap: 6px; 
    flex-wrap: wrap; 
  }
  
  .msg-text  { 
    font-size: calc(13px * var(--font-scale)); 
    color: var(--text); 
    line-height: 1.5; 
    margin-top: 1px; 
    word-break: break-word;
    overflow-wrap: anywhere;
  }

  .platform-tag {
    font-size: calc(9px * var(--font-scale)); 
    font-family: var(--mono); 
    font-weight: 500;
    padding: 1px 4px; 
    border-radius: 2px; 
    letter-spacing: 0.04em;
    text-transform: uppercase; 
    flex-shrink: 0; 
    margin-top: 3px;
  }
  
  .pt-twitch   { background: rgba(145, 71, 255, 0.15); color: #c08fff; }
  .pt-youtube  { background: rgba(255, 0, 0, 0.12); color: #ff8080; }
  .pt-kick     { background: rgba(83, 252, 24, 0.1); color: #7dff6b; }
  .pt-abstract { background: rgba(0, 255, 163, 0.1); color: #00ffa3; }
  .pt-discord  { background: rgba(114, 137, 218, 0.15); color: #7289da; }

  /* ── Links Bar ── */
  .links-bar {
    display: flex; 
    gap: 6px; 
    padding: 6px 12px;
    background: rgba(0, 0, 0, 0.2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    overflow-x: auto;
    /* Invisible horizontal scroll */
    scrollbar-width: none; 
    -ms-overflow-style: none; 
  }
  
  .links-bar::-webkit-scrollbar { 
    display: none; 
  }

  .stream-link {
    font-size: 10px; 
    font-family: var(--mono);
    padding: 2px 7px; 
    border-radius: 3px;
    text-decoration: none; 
    font-weight: 500;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  
  .stream-link:hover { opacity: 0.75; }
  .sl-twitch    { background: rgba(145, 71, 255, 0.15); color: #c08fff; }
  .sl-youtube   { background: rgba(255, 0, 0, 0.12); color: #ff8080; }
  .sl-kick      { background: rgba(83, 252, 24, 0.1); color: #7dff6b; }
  .sl-abstract  { background: rgba(0, 255, 163, 0.1); color: #00ffa3; }

  /* ── Footer ── */
  footer {
    padding: 8px 12px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; 
    align-items: center; 
    justify-content: space-between;
    flex-shrink: 0;
    gap: 8px;
  }

  .counters { 
    display: flex; 
    gap: 12px; 
    flex-wrap: wrap; 
  }
  
  .counter { 
    font-size: 11px; 
    color: var(--muted); 
    font-family: var(--mono); 
    display: flex; 
    align-items: center; 
    gap: 4px; 
  }
  
  .counter-num { 
    font-weight: 500; 
    color: var(--text); 
  }

  .auto-scroll-btn {
    font-size: 11px; 
    font-weight: 500; 
    padding: 3px 8px;
    border-radius: 4px; 
    border: 1px solid var(--border);
    background: none; 
    color: var(--muted); 
    cursor: pointer;
    font-family: var(--font); 
    transition: all 0.15s;
    white-space: nowrap;
  }
  
  .auto-scroll-btn.on { 
    border-color: rgba(145, 71, 255, 0.4); 
    color: var(--twitch); 
    background: rgba(145, 71, 255, 0.08); 
  }
  
  .auto-scroll-btn:hover { 
    background: rgba(255, 255, 255, 0.05); 
  }

  /* ── UI Toggle Button ── */
  .toggle-ui-btn {
    position: fixed;
    top: 6px;
    right: 6px;
    z-index: 999;
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 9px;
    padding: 3px 7px;
    border-radius: 3px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.2s;
    opacity: 0.35;
  }

  .toggle-ui-btn:hover {
    opacity: 1;
    color: var(--text);
    background: rgba(255,255,255,0.12);
  }

  /* When hidden, collapse header, links bar, and footer */
  .ui-hidden header,
  .ui-hidden .links-bar,
  .ui-hidden footer {
    display: none !important;
  }

  /* Button fades out in hidden mode, reappears on hover */
  .ui-hidden .toggle-ui-btn {
    opacity: 0;
  }
  .ui-hidden .toggle-ui-btn:hover {
    opacity: 1;
  }

  .empty-state {
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center;
    height: 100%; 
    gap: 8px; 
    color: var(--muted); 
    padding: 2rem;
  }
  
  .empty-state p { 
    font-size: 13px; 
    text-align: center; 
    line-height: 1.7; 
  }
</style>
</head>
<body>
<div id="app">

  <button class="toggle-ui-btn" onclick="toggleUI()" title="Hide/show UI">UI</button>

  <header>
    <div class="header-top">
      <span class="logo" id="brand-name">MultiChat</span>
      <span class="live-badge">live</span>
    </div>
    <div class="header-left">
      <div class="control-group" style="position:relative;">
        <label class="control-label">BG</label>
        <button id="color-swatch" onclick="toggleColorPicker()" title="Pick background color" style="
          width:22px; height:14px; border-radius:3px; border:1px solid rgba(255,255,255,0.2);
          background:#0e0e10; cursor:pointer; flex-shrink:0; padding:0;
        "></button>
        <input type="range" id="bg-alpha-slider" min="0" max="1" step="0.01" value="1">
        <span class="control-val" id="bg-val">100%</span>
        <!-- Color picker popover -->
        <div id="color-picker" style="display:none; position:absolute; top:calc(100% + 6px); left:0; z-index:1000;
          background:#1a1a1d; border:1px solid rgba(255,255,255,0.12); border-radius:8px;
          padding:12px; width:220px; box-shadow:0 8px 32px rgba(0,0,0,0.6);">
          <!-- Color wheel canvas -->
          <canvas id="color-wheel" width="196" height="196" style="border-radius:50%; cursor:crosshair; display:block;"></canvas>
          <!-- Lightness slider -->
          <div style="margin-top:10px;">
            <div style="font-size:9px; font-family:var(--mono); color:var(--muted); margin-bottom:4px;">LIGHTNESS</div>
            <input type="range" id="lightness-slider" min="0" max="100" value="8" style="width:100%; accent-color:var(--abstract);">
          </div>
          <!-- Hex input -->
          <div style="margin-top:8px; display:flex; gap:6px; align-items:center;">
            <div style="font-size:9px; font-family:var(--mono); color:var(--muted);">HEX</div>
            <input type="text" id="hex-input" value="#0e0e10" style="
              flex:1; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
              color:var(--text); font-family:var(--mono); font-size:11px;
              padding:3px 7px; border-radius:4px; outline:none;
            ">
            <button onclick="applyHex()" style="
              background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12);
              color:var(--text); font-family:var(--mono); font-size:9px;
              padding:3px 8px; border-radius:4px; cursor:pointer;
            ">OK</button>
          </div>
          <!-- Presets -->
          <div style="margin-top:10px;">
            <div style="font-size:9px; font-family:var(--mono); color:var(--muted); margin-bottom:5px;">PRESETS</div>
            <div style="display:flex; gap:5px; flex-wrap:wrap;" id="presets"></div>
          </div>
        </div>
      </div>
      <div class="control-group">
        <label for="font-slider" class="control-label">Size</label>
        <input type="range" id="font-slider" min="0.5" max="2" step="0.05" value="1">
        <span class="control-val" id="font-val">100%</span>
      </div>
    </div>
  </header>

  <div class="links-bar" id="links-bar">
    <!-- Populated from config.js CHANNELS -->
  </div>

  <div id="messages">
    <div class="empty-state" id="empty">
      <p>Waiting for messages…</p>
    </div>
  </div>

  <footer>
    <div class="counters">
      <button class="counter-btn active-all" id="fbtn-all" onclick="setFilter('all', this)" data-filter="all" title="All platforms">All</button>
      <button class="counter-btn" id="fbtn-twitch" onclick="setFilter('twitch', this)" data-filter="twitch" title="Twitch only">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>
        <span id="cnt-twitch">0</span>
      </button>
      <button class="counter-btn" id="fbtn-youtube" onclick="setFilter('youtube', this)" data-filter="youtube" title="YouTube only">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0"><path d="M23.495 6.205a3.007 3.007 0 0 0-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 0 0 .527 6.205a31.247 31.247 0 0 0-.522 5.805 31.247 31.247 0 0 0 .522 5.783 3.007 3.007 0 0 0 2.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 0 0 2.088-2.088 31.247 31.247 0 0 0 .5-5.783 31.247 31.247 0 0 0-.5-5.805zM9.609 15.601V8.408l6.264 3.602z"/></svg>
        <span id="cnt-youtube">0</span>
      </button>
      <button class="counter-btn" id="fbtn-kick" onclick="setFilter('kick', this)" data-filter="kick" title="Kick only">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0"><path d="M3 2h4v8l5-8h5l-5 8 5 8h-5l-5-8v8H3z"/></svg>
        <span id="cnt-kick">0</span>
      </button>
      <button class="counter-btn" id="fbtn-abstract" onclick="setFilter('abstract', this)" data-filter="abstract" title="Abstract only">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0"><path d="M12 2L3 7v10l9 5 9-5V7L12 2zm0 2.18L19 8.1v7.8l-7 3.92-7-3.92V8.1l7-3.92z"/></svg>
        <span id="cnt-abstract">0</span>
      </button>
      <button class="counter-btn" id="fbtn-discord" onclick="setFilter('discord', this)" data-filter="discord" title="Discord only">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.045.036.057a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .036-.057c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
        <span id="cnt-discord">0</span>
      </button>
    </div>
    <button class="auto-scroll-btn on" id="scroll-btn" onclick="toggleAutoScroll()">⬆️⬇️</button>
  </footer>

</div>

<script src="config.js" onerror=""></script>
<script>
// If running in Electron, load settings async then init.
// If running in browser, config.js already loaded above — init immediately.
async function __loadConfigThenInit() {
  if (window.__electronBridge) {
    const saved = await window.__electronBridge.getSettings();
    if (saved) window.CONFIG = saved;
  }
  __initApp();
}
function __initApp() {
/* ── State Management ── */
let filter = 'all';
let autoScroll = true;
let counts = { twitch: 0, youtube: 0, kick: 0, abstract: 0, discord: 0 };

const msgContainer = document.getElementById('messages');
const emptyState   = document.getElementById('empty');

/* ── Settings Persistence ── */
const SETTINGS_KEY = 'multichat_settings';

function loadSettings() {
  try {
    return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {};
  } catch(e) { return {}; }
}

function saveSettings(patch) {
  const current = loadSettings();
  localStorage.setItem(SETTINGS_KEY, JSON.stringify({ ...current, ...patch }));
}

/* ── Color Picker ── */
const _s = loadSettings();
const _d = (typeof CONFIG !== 'undefined' && CONFIG.DEFAULTS) || { bgColor: { r:14,g:14,b:16 }, bgAlpha: 1, fontScale: 1 };
let bgColor = _s.bgColor || _d.bgColor;
let bgAlpha = _s.bgAlpha !== undefined ? _s.bgAlpha : _d.bgAlpha;

function updateBg() {
  const { r, g, b } = bgColor;
  document.documentElement.style.setProperty('--bg',      `rgba(${r},${g},${b},${bgAlpha})`);
  document.documentElement.style.setProperty('--surface', `rgba(${Math.min(r+10,255)},${Math.min(g+10,255)},${Math.min(b+10,255)},${bgAlpha})`);
  document.getElementById('color-swatch').style.background = `rgba(${r},${g},${b},1)`;
  document.getElementById('bg-val').textContent = Math.round(bgAlpha * 100) + '%';
  document.getElementById('bg-alpha-slider').value = bgAlpha;
  saveSettings({ bgColor, bgAlpha });
}

document.getElementById('bg-alpha-slider').addEventListener('input', (e) => {
  bgAlpha = parseFloat(e.target.value);
  updateBg();
});

function toggleColorPicker() {
  const picker = document.getElementById('color-picker');
  if (picker.style.display === 'none') {
    picker.style.display = 'block';
    drawWheel();
  } else {
    picker.style.display = 'none';
  }
}

// Close picker when clicking outside
document.addEventListener('click', (e) => {
  const picker = document.getElementById('color-picker');
  const swatch = document.getElementById('color-swatch');
  if (picker.style.display !== 'none' && !picker.contains(e.target) && e.target !== swatch) {
    picker.style.display = 'none';
  }
});

function drawWheel() {
  const canvas = document.getElementById('color-wheel');
  const ctx = canvas.getContext('2d');
  const cx = canvas.width / 2, cy = canvas.height / 2, r = cx;
  const lightness = parseInt(document.getElementById('lightness-slider').value);

  for (let y = 0; y < canvas.height; y++) {
    for (let x = 0; x < canvas.width; x++) {
      const dx = x - cx, dy = y - cy;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > r) continue;
      const hue = (Math.atan2(dy, dx) * 180 / Math.PI + 360) % 360;
      const sat = (dist / r) * 100;
      ctx.fillStyle = `hsl(${hue},${sat}%,${lightness + (100-lightness) * (1 - dist/r) * 0.15}%)`;
      ctx.fillRect(x, y, 1, 1);
    }
  }
}

document.getElementById('color-wheel').addEventListener('click', (e) => {
  const canvas = document.getElementById('color-wheel');
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.clientY - rect.top) * (canvas.height / rect.height);
  const ctx = canvas.getContext('2d');
  const px = ctx.getImageData(Math.round(x), Math.round(y), 1, 1).data;
  bgColor = { r: px[0], g: px[1], b: px[2] };
  document.getElementById('hex-input').value = rgbToHex(px[0], px[1], px[2]);
  updateBg(); // updateBg already calls saveSettings
});

document.getElementById('lightness-slider').addEventListener('input', () => drawWheel());

function rgbToHex(r, g, b) {
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return isNaN(r) ? null : {r,g,b};
}

function applyHex() {
  const rgb = hexToRgb(document.getElementById('hex-input').value);
  if (rgb) { bgColor = rgb; updateBg(); } // updateBg calls saveSettings
}

document.getElementById('hex-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') applyHex();
});

// Presets
const presets = ['#0e0e10','#000000','#1a0a2e','#0a1628','#0d1f0d','#1a1a1a','#2d1b00','#1a0000','#ffffff'];

/* ── Platform UI Configuration ── */
const platformData = {
  twitch:   { tag: 'pt-twitch',   uClass: 'u-twitch',   label: 'TW' },
  youtube:  { tag: 'pt-youtube',  uClass: 'u-youtube',  label: 'YT' },

/* Helper: Escape HTML to prevent XSS */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Public Message Interface ── */
function addMessage(platform, username, text, badge) {
  if (!platformData[platform]) return;
  emptyState.style.display = 'none';

  counts[platform]++;
  document.getElementById('cnt-' + platform).textContent = counts[platform];

  const p    = platformData[platform];
  const time = new Date().toTimeString().slice(0, 5);

  const badgeMap = { sub: 'badge-sub', mod: 'badge-mod', vip: 'badge-vip' };
  const badgeHtml = badge && badgeMap[badge]
    ? `<span class="badge ${badgeMap[badge]}">${esc(badge)}</span>` : '';

  const div = document.createElement('div');
  div.className = 'msg' + (filter !== 'all' && filter !== platform ? ' platform-hidden' : '');
  div.dataset.platform = platform;
  div.innerHTML = `
    <span class="platform-tag ${p.tag}">${p.label}</span>
    <div class="msg-body">
      <div class="msg-header">
        <span class="username ${p.uClass}">${esc(username)}</span>
        ${badgeHtml}
        <span class="timestamp">${time}</span>
      </div>
      <div class="msg-text">${esc(text)}</div>
    </div>`;

  msgContainer.appendChild(div);
  if (autoScroll) msgContainer.scrollTop = msgContainer.scrollHeight;
}

/* ── Streamer.bot WebSocket ── */
const SB_WS = (typeof CONFIG !== 'undefined' && CONFIG.SB_WS_URL) || 'ws://127.0.0.1:8080/';

function connectStreamerBot() {
  const ws = new WebSocket(SB_WS);

  ws.onopen = () => {
    ws.send(JSON.stringify({
      request: 'Subscribe',
      events: {
        Twitch:  ['ChatMessage'],
        YouTube: ['Message'],
        Kick:    ['ChatMessage']
      },
      id: 'multichat-sub'
    }));
  };

  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      handleSBEvent(data);
    } catch(e) {}
  };

  ws.onclose = () => setTimeout(connectStreamerBot, 5000);
}

function handleSBEvent(data) {
  const evt = data.event;
  if (!evt) return;

  if (evt.source === 'Twitch' && evt.type === 'ChatMessage') {
    const m = data.data.message;
    addMessage('twitch', m.displayName, m.message, m.subscriber ? 'sub' : m.moderator ? 'mod' : '');
  }
  
  if (evt.source === 'YouTube' && evt.type === 'Message') {
    const d = data.data || {};
    const username = d.user?.name || d.user?.displayName || 'YouTube User';
    const text = typeof d.message === 'string' ? d.message : (d.message?.text || '');
    if (text) addMessage('youtube', username, text, '');
  }
  
  if (evt.source === 'Kick' && evt.type === 'ChatMessage') {
    // Streamer.bot nests Kick data inside data.data.message
    const d = data.data?.message || data.data || {};

    const username =
      d.user?.login ||
      d.user?.name ||
      d.user?.username ||
      d.sender?.login ||
      d.sender?.username ||
      'Kick User';

    let text = '';
    if (typeof d.text === 'string' && d.text) {
      text = d.text;
    } else if (Array.isArray(d.parts) && d.parts.length) {
      text = d.parts.map(p => p.text || '').join('');
    } else if (typeof d.content === 'string' && d.content) {
      text = d.content;
    } else {
      text = '[DEBUG]: ' + JSON.stringify(d);
    }

    const isMod = d.user?.isModerator || d.user?.is_moderator || false;
    const isSub = d.user?.isSubscribed || d.user?.is_subscriber || false;
    const badge = isSub ? 'sub' : isMod ? 'mod' : '';

    addMessage('kick', username, text, badge);
  }
}

connectStreamerBot();

/* ── Abstract Chat WebSocket ── */
const ABS_WS_URL = (typeof CONFIG !== 'undefined' && CONFIG.ABS_WS_URL) || '';
const ABS_SEEN   = new Set();

function connectAbstract() {
  const ws = new WebSocket(ABS_WS_URL);
  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      
      if (data.type === 'chat_history' && data.payload?.messages) {
        data.payload.messages.forEach(m => {
          if (!ABS_SEEN.has(m.id)) {
            ABS_SEEN.add(m.id);
            addMessage('abstract', m.user_name || 'anon', m.text || '', '');
          }
        });
      }
      
      if (data.type === 'chat_message' && data.payload) {
        const m = data.payload;
        if (!ABS_SEEN.has(m.id)) {
          ABS_SEEN.add(m.id);
          addMessage('abstract', m.user_name || 'anon', m.text || '', '');
        }
      }
    } catch(e) {}
  };
  ws.onclose = () => setTimeout(connectAbstract, 5000);
}

// Only connect to Abstract if a URL is configured
if (ABS_WS_URL) connectAbstract();

/* ── Discord Bridge WebSocket ── */
function connectDiscord() {
  const url = (typeof CONFIG !== 'undefined' && CONFIG.DISCORD_WS_URL) || 'ws://127.0.0.1:8081/';
  const ws = new WebSocket(url);

  ws.onopen = () => console.log('Discord bridge connected');

  ws.onmessage = (event) => {
    try {
      const d = JSON.parse(event.data);
      if (d.platform === 'discord' && d.username && d.text) {
        addMessage('discord', d.username, d.text, '');
      }
    } catch(e) {}
  };

  ws.onclose = () => setTimeout(connectDiscord, 5000);
  ws.onerror = () => {}; // Silently retry if bridge isn't running
}

connectDiscord();
